<style>
  /* =====================================================
     Dashboard Fiscal Bordagran — v3.3.0
     Solo lectura. Sin botones que modifiquen datos.
     ===================================================== */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg:         #f4f6f9;
    --color-card:       #ffffff;
    --color-border:     #e0e4ea;
    --color-text:       #1a1d23;
    --color-muted:      #6b7280;
    --color-primary:    #2563eb;
    --color-green:      #16a34a;
    --color-yellow:     #ca8a04;
    --color-red:        #dc2626;
    --color-green-bg:   #dcfce7;
    --color-yellow-bg:  #fef9c3;
    --color-red-bg:     #fee2e2;
    --radius:           8px;
    --shadow:           0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.5;
    padding: 0;
  }

  /* ──── Header ──── */
  header {
    background: var(--color-primary);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 12px; opacity: .8; margin-top: 2px; }
  .btn-refresh {
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.4);
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .15s;
  }
  .btn-refresh:hover { background: rgba(255,255,255,.3); }

  /* ──── Layout principal ──── */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ──── Filtros ──── */
  .filtros {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .filtro-grupo { display: flex; flex-direction: column; gap: 4px; }
  .filtro-grupo label { font-size: 11px; font-weight: 500; color: var(--color-muted); text-transform: uppercase; letter-spacing: .05em; }
  .filtro-grupo select, .filtro-grupo input {
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    background: var(--color-bg);
    color: var(--color-text);
    min-width: 140px;
  }
  .btn-limpiar {
    background: none;
    border: 1px solid var(--color-border);
    color: var(--color-muted);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    align-self: flex-end;
  }
  .btn-limpiar:hover { border-color: var(--color-primary); color: var(--color-primary); }

  /* ──── Título de sección ──── */
  .seccion-titulo {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: 24px 0 10px;
  }

  /* ──── Grid de tarjetas KPI ──── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .kpi-card .kpi-label {
    font-size: 11px;
    color: var(--color-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .kpi-card .kpi-valor {
    font-size: 24px;
    font-weight: 700;
    color: var(--color-text);
  }
  .kpi-card .kpi-sub {
    font-size: 11px;
    color: var(--color-muted);
    margin-top: 2px;
  }
  .kpi-card.verde  { border-left: 4px solid var(--color-green); }
  .kpi-card.amarillo { border-left: 4px solid var(--color-yellow); }
  .kpi-card.rojo   { border-left: 4px solid var(--color-red); }
  .kpi-card.azul   { border-left: 4px solid var(--color-primary); }

  /* ──── Alertas ──── */
  .alertas-lista { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .alerta-item {
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    border: 1px solid transparent;
  }
  .alerta-item.rojo    { background: var(--color-red-bg);    border-color: #fca5a5; }
  .alerta-item.amarillo { background: var(--color-yellow-bg); border-color: #fde68a; }
  .alerta-item.verde   { background: var(--color-green-bg);  border-color: #86efac; }
  .alerta-item .alerta-icono { font-size: 16px; flex-shrink: 0; line-height: 1.4; }
  .alerta-item .alerta-texto strong { display: block; margin-bottom: 1px; }

  /* ──── Tablas ──── */
  .tabla-wrapper {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto;
    margin-bottom: 24px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--color-muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { background: #e9ecf1; }
  tbody tr { border-bottom: 1px solid var(--color-border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 9px 12px; vertical-align: top; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-verde    { background: var(--color-green-bg);  color: var(--color-green); }
  .badge-amarillo { background: var(--color-yellow-bg); color: var(--color-yellow); }
  .badge-rojo     { background: var(--color-red-bg);    color: var(--color-red); }
  .badge-gris     { background: #f3f4f6;                color: var(--color-muted); }
  .badge-azul     { background: #dbeafe;                color: var(--color-primary); }

  /* ──── Spinner ──── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    color: var(--color-muted);
    font-size: 15px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: var(--color-red-bg);
    border: 1px solid #fca5a5;
    border-radius: var(--radius);
    padding: 16px;
    color: var(--color-red);
    margin-bottom: 20px;
  }

  /* ──── Responsive ──── */
  @media (max-width: 640px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .filtros  { flex-direction: column; }
    header    { flex-direction: column; gap: 10px; }
  }
</style>
